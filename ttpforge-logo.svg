<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>TTPForce logo</title>
  <desc>TTPForce purple team TTP tracker logo featuring an anvil with a lightning bolt and chain link, rendered in purple tones</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Anvil body base -->
  <rect x="230" y="200" width="220" height="52" rx="6" fill="#3C3489"/>
  <!-- Anvil horn (left taper) -->
  <polygon points="230,200 195,228 230,252" fill="#3C3489"/>
  <!-- Anvil top face -->
  <rect x="218" y="168" width="200" height="38" rx="5" fill="#534AB7"/>
  <!-- Anvil top highlight edge -->
  <rect x="218" y="168" width="200" height="6" rx="3" fill="#7F77DD"/>
  <!-- Chain links -->
  <ellipse cx="248" cy="148" rx="18" ry="11" fill="none" stroke="#AFA9EC" stroke-width="6" transform="rotate(-30 248 148)"/>
  <ellipse cx="432" cy="148" rx="18" ry="11" fill="none" stroke="#AFA9EC" stroke-width="6" transform="rotate(30 432 148)"/>
  <line x1="262" y1="144" x2="288" y2="162" stroke="#AFA9EC" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="300" cy="145" rx="18" ry="11" fill="none" stroke="#AFA9EC" stroke-width="6"/>
  <line x1="318" y1="145" x2="340" y2="145" stroke="#AFA9EC" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="352" cy="145" rx="18" ry="11" fill="none" stroke="#AFA9EC" stroke-width="6"/>
  <line x1="370" y1="148" x2="418" y2="143" stroke="#AFA9EC" stroke-width="6" stroke-linecap="round"/>
  <!-- Lightning bolt -->
  <polygon points="340,108 326,172 340,162 328,202 362,155 344,165 358,108" fill="#FAC775" opacity="0.95"/>
  <!-- Sparks -->
  <circle cx="365" cy="122" r="4" fill="#FAC775" opacity="0.8"/>
  <circle cx="374" cy="136" r="2.5" fill="#FAC775" opacity="0.6"/>
  <circle cx="318" cy="118" r="3" fill="#FAC775" opacity="0.7"/>
  <circle cx="308" cy="130" r="2" fill="#FAC775" opacity="0.5"/>
  <!-- Anvil legs -->
  <rect x="255" y="250" width="40" height="22" rx="3" fill="#26215C"/>
  <rect x="385" y="250" width="40" height="22" rx="3" fill="#26215C"/>
  <!-- Base plate -->
  <rect x="238" y="270" width="204" height="10" rx="3" fill="#1a1740"/>
  <!-- Red / Purple / Blue team dots -->
  <circle cx="410" cy="188" r="9" fill="#D85A30"/>
  <circle cx="270" cy="188" r="9" fill="#185FA5"/>
  <circle cx="340" cy="184" r="9" fill="#7F77DD"/>
  <!-- Wordmark -->
  <text x="340" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="#7F77DD" letter-spacing="6">TTP</text>
  <text x="420" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="500" fill="#3C3489" letter-spacing="4">FORCE</text>
  <!-- Tagline -->
  <text x="340" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#888780" letter-spacing="3">PURPLE TEAM · TTP TRACKER</text>
</svg>
